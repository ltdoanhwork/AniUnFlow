# V4 + UnSAMFlow-inspired SAM strategy
# ====================================
# Muc tieu:
# - Giu photometric hoc motion that su o giai doan dau.
# - Bat occ-aware va SAM losses tre (giong UnSAMFlow occ_aware_start_epoch=5).
# - Ramp SAM losses de tranh over-regularization som.

seed: 1337
workspace: workspaces/v4_unsamflow_strategy

data:
  name: animerun_clip
  train_root: data/AnimeRun_v2/
  val_root: data/AnimeRun_v2/
  T: 3
  stride_min: 1
  stride_max: 1
  crop_size: [256, 512]
  resize: true
  keep_aspect: false
  load_sam_masks: true
  sam_mask_dir: data/AnimeRun_v2/SAM_Masks_v2
  batch_size: 4
  num_workers: 4
  shuffle: true
  drop_last: true

model:
  enc_channels: 24
  enc_out_channels: 64
  token_dim: 96
  lcm_depth: 3
  lcm_heads: 4
  gtr_depth: 1
  gtr_heads: 4
  iters_per_level: 3

sam:
  enabled: true
  use_encoder_features: true
  use_mask_guidance: true
  feature_concat: true
  attention_bias: true
  cost_modulation: true
  object_pooling: true
  encoder_checkpoint: models/sam2/checkpoints/sam2.1_hiera_tiny.pt
  encoder_config: configs/sam2.1/sam2.1_hiera_t.yaml
  encoder_freeze: true
  feature_dim: 256
  feature_scales: [8, 16]
  num_segments: 32
  mask_cache_dir: data/AnimeRun_v2/SAM_Masks_v2
  add_mask_corr: true
  mask_corr_aggregation: concat
  mask_corr_weight: 1.0
  mask_corr_min_pixels: 8

loss:
  photo: 1.0
  photo_ssim_alpha: 0.85
  smooth: 0.025
  consistency: 0.025

  # Anti-collapse + warmup
  mag_reg: 0.10
  min_flow_mag: 0.60
  warmup_steps: 2000
  disable_occ_during_warmup: true
  occ_aware_start_epoch: 5

  # 2-stage SAM schedule
  sam_loss_start_epoch: 4
  sam_loss_ramp_epochs: 8
  sam_loss_scale: 1.0

  # SAM-guided losses (start nhe, sau do ramp)
  homography_smooth: 0.025
  boundary_sharpness: 0.020
  object_variance: 0.020
  segment_consistency: 0.0
  boundary_aware_smooth: 0.025

optim:
  lr: 1.2e-4
  weight_decay: 1.0e-4
  epochs: 60
  warmup_epochs: 5
  clip: 0.7
  accum_steps: 1
  scheduler:
    type: onecycle
    max_lr: 2.0e-4
    pct_start: 0.10

logging:
  use_tb: true
  tb_dir: tb_v4_unsamflow_strategy
  log_every: 50

validation:
  every_n_epochs: 1

ckpt:
  save_every: 5
  keep_last: 3
  save_best: true
