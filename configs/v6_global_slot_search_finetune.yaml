seed: 1337
workspace: workspaces/v6_global_slot_search_finetune

data:
  name: animerun_clip
  train_root: data/AnimeRun_v2/
  val_root: data/AnimeRun_v2/
  T: 5
  stride_min: 1
  stride_max: 2
  crop_size: [256, 512]
  resize: true
  keep_aspect: false
  load_sam_masks: true
  sam_mask_dir: data/AnimeRun_v2/SAM_Masks_v2
  sam_mask_cache_size: 4096
  val_load_sam_masks: true
  val_sam_mask_dir: data/AnimeRun_v2/SAM_Masks_v2
  val_sam_mask_cache_size: 1024
  batch_size: 6
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 6
  val_num_workers: 4
  val_persistent_workers: true
  val_prefetch_factor: 3
  shuffle: true
  drop_last: true

model:
  name: AniFlowFormerTV6
  backbone: v6_global_slot_search
  enc_channels: 40
  slot_dim: 160
  slot_hidden_dim: 256
  temporal_memory_depth: 3
  temporal_memory_heads: 4
  temporal_memory_dropout: 0.0
  num_slots: 32
  overlap_prior_weight: 3.0
  use_long_gap_matching: true
  predict_layer_order: true
  slot_basis_count: 4
  slot_basis_scale: 0.18
  slot_affine_scale: 0.25
  global_match_dim: 96
  global_downsample_factor: 2
  global_softmax_temperature: 0.07
  global_update_scale: 1.0
  global_confidence_floor: 0.04
  dense_match_hidden_dim: 160
  dense_match_radius_l2: 6
  dense_match_radius_l1: 4
  dense_delta_scale_l2: 8.0
  dense_delta_scale_l1: 4.5
  dense_prior_mix: 0.35
  dense_update_scale_l2: 0.45
  dense_update_scale_l1: 0.20
  dense_confidence_floor: 0.02
  visibility_hidden_dim: 128
  visibility_confidence_floor: 0.10
  occlusion_hidden_dim: 96
  residual_hidden_dim: 128
  residual_blocks: 4
  residual_boundary_scale: 0.75
  residual_base_scale: 0.18
  residual_confidence_floor: 0.35

sam:
  enabled: true
  use_encoder_features: true
  use_mask_guidance: true
  encoder_checkpoint: models/sam2/checkpoints/sam2.1_hiera_tiny.pt
  encoder_config: configs/sam2.1/sam2.1_hiera_t.yaml
  encoder_freeze: true
  feature_dim: 256
  feature_scales: [8, 16]
  num_segments: 32
  mask_cache_dir: data/AnimeRun_v2/SAM_Masks_v2

loss:
  photo: 1.0
  photo_ssim_alpha: 0.85
  smooth: 0.02
  consistency: 0.02
  mag_reg: 0.05
  min_flow_mag: 0.5
  warmup_steps: 1200
  disable_occ_during_warmup: true
  occ_aware_start_epoch: 5
  segment_warp: 0.20
  dense_slot_consistency: 0.20
  boundary_residual: 0.020
  segment_cycle: 0.05
  global_photo: 0.15
  global_fused_consistency: 0.10
  visibility_consistency: 0.06
  occlusion_composite: 0.06
  slot_deformation_reg: 0.02
  hard_motion_reweight: 0.08
  slot_photo: 0.15
  long_gap_photo_weight: 0.04
  long_gap_consistency_weight: 0.015
  long_gap_start_epoch: 18
  long_gap_ramp_epochs: 4

optim:
  lr: 8.0e-6
  weight_decay: 1.0e-4
  epochs: 32
  warmup_epochs: 0
  clip: 0.6
  accum_steps: 2
  freeze_encoder_epoch: 0
  scheduler:
    type: cosine
    min_lr: 1.0e-6
    per_batch: false

logging:
  use_tb: true
  tb_dir: tb_v6_global_slot_search_finetune
  log_every: 100

validation:
  every_n_epochs: 1
  early_stop_delta: 0.3
  early_stop_patience: 4

teacher:
  enabled: true
  ema_decay: 0.999
  start_step: 1800
  distill_weight: 0.06
  confidence_threshold: 0.7
  every_n_steps: 4

runtime:
  nan_guard_enabled: true
  nan_guard_flow_clip: 500.0
  schedule:
    - start_epoch: 1
      end_epoch: 8
      stride_min: 1
      stride_max: 1
      enable_occ_aware: false
      enable_long_gap: false
      enable_residual_branch: false
      enable_segment_cycle: false
      enable_layered_order: false
      enable_global_matcher: true
      enable_local_refine: false
      enable_visibility_composite: false
      enable_hard_motion_reweight: false
    - start_epoch: 9
      end_epoch: 20
      stride_min: 1
      stride_max: 2
      enable_occ_aware: true
      enable_long_gap: false
      enable_residual_branch: true
      enable_segment_cycle: false
      enable_layered_order: false
      enable_global_matcher: true
      enable_local_refine: true
      enable_visibility_composite: true
      enable_hard_motion_reweight: false
    - start_epoch: 21
      end_epoch: 32
      stride_min: 1
      stride_max: 2
      enable_occ_aware: true
      enable_long_gap: true
      enable_residual_branch: true
      enable_segment_cycle: true
      enable_layered_order: true
      enable_global_matcher: true
      enable_local_refine: true
      enable_visibility_composite: true
      enable_hard_motion_reweight: true

ckpt:
  save_every: 2
  keep_last: 3
  save_best: true
