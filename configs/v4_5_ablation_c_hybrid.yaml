# Ablation C: + RAFT-style iterative refiner (without mask-corr aux)
seed: 1337
workspace: workspaces/v4_5_ablation_c_hybrid

data:
  name: animerun_clip
  train_root: data/AnimeRun_v2/
  val_root: data/AnimeRun_v2/
  T: 3
  stride_min: 1
  stride_max: 1
  crop_size: [256, 512]
  resize: true
  keep_aspect: false
  load_sam_masks: true
  sam_mask_dir: data/AnimeRun_v2/SAM_Masks_v2
  val_load_sam_masks: true
  val_sam_mask_dir: data/AnimeRun_v2/SAM_Masks_v2
  batch_size: 8
  num_workers: 4

model:
  backbone: v4_5_hybrid_sam
  enc_channels: 32
  enc_out_channels: 64
  token_dim: 128
  num_heads: 4
  lcm_depth: 4
  lcm_heads: 4
  gtr_depth: 1
  gtr_heads: 4
  iters_per_level: 3
  refiner_iters: 10
  use_convex_upsampler: true

sam:
  enabled: true
  use_encoder_features: true
  use_mask_guidance: true
  feature_concat: true
  attention_bias: true
  cost_modulation: true
  object_pooling: true
  encoder_checkpoint: models/sam2/checkpoints/sam2.1_hiera_tiny.pt
  encoder_config: configs/sam2.1/sam2.1_hiera_t.yaml
  encoder_freeze: true
  feature_dim: 256
  feature_scales: [8, 16]
  num_segments: 32
  add_mask_corr: false
  matcher_topk: 96
  segment_cross_attn_every: 2
  mask_corr_weight_init: 0.5
  boundary_gate_strength: 0.3

loss:
  photo: 1.0
  photo_ssim_alpha: 0.85
  smooth: 0.02
  consistency: 0.02
  mag_reg: 0.10
  min_flow_mag: 0.60
  warmup_steps: 2000
  disable_occ_during_warmup: true
  occ_aware_start_epoch: 9
  sam_loss_start_epoch: 9
  sam_loss_ramp_epochs: 15
  sam_loss_scale: 1.0
  homography_smooth: 0.02
  boundary_sharpness: 0.02
  object_variance: 0.02
  segment_consistency: 0.0
  boundary_aware_smooth: 0.02

optim:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 30
  warmup_epochs: 5
  clip: 0.5
  accum_steps: 1
  scheduler:
    type: onecycle
    max_lr: 1.0e-4
    pct_start: 0.10

logging:
  use_tb: true
  tb_dir: tb_v4_5_ablation_c_hybrid
  log_every: 50

validation:
  every_n_epochs: 1

ckpt:
  save_every: 5
  keep_last: 3
  save_best: true
